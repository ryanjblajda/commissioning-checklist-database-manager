<form class="suggestion-form" #suggestionbox="ngForm" (ngSubmit)="submitSuggestion()">
        <section>
            <h2>Device Details</h2>
        </section>
    
        <section class="layout shrink">
            <section class="container">
                <label for="prefix">Device Prefix:</label>
                <app-combobox [name]="prefix" [options]="prefixes()" (selected)="selectPrefix($event)"></app-combobox>
            </section>

            <section class="container">
                <label for="mfr">Device Manufacturer Name:</label>
                <app-combobox [name]="manufacturer" [options]="manufacturers()" (selected)="selectManufacturer($event)"></app-combobox>
            </section>

            <section class="container">
                <label for="model">Device Model Name:</label>
                <input #input class="uppercase" id="model" type="text" placeholder="MXA910" [value]="modelSelected()" (input)="selectModel(input.value)"/>
            </section>
        </section>

        <section class="members">
            <app-item-list [items]="capabilities()" [title]="capabilityListTitle"></app-item-list>
            <app-item-list [items]="controls()" [title]="controlListTitle"></app-item-list>
        </section>
        <section class="submit">
            <button [class.disabled]="submitButtonDisabled()" [disabled]="submitButtonDisabled()" type="submit">{{submitButtonText()}}</button>
        </section>
    </form>
